spring.application.name=consensus

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/consensus
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Logging
logging.level.org.flywaydb=DEBUG

# JWT secrets (use long, random Base64-encoded strings in production)
jwt.issuer=consensus_api
jwt.access-secret=change-me-access-secret-must-be-at-least-32-chars!!
jwt.refresh-secret=change-me-refresh-secret-must-be-at-least-32-chars!
jwt.email-secret=change-me-email-secret-must-be-at-least-32-chars!!!
jwt.password-secret=change-me-password-secret-must-be-at-least-32-chars!

# JWT expiration durations (in seconds)
jwt.access-expiration-seconds=900
jwt.refresh-expiration-seconds=604800
jwt.email-expiration-seconds=86400
jwt.password-expiration-seconds=3600
